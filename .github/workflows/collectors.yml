name: Refresh data snapshots

# Scheduled trigger DISABLED. GitHub Actions' free-tier scheduler proved
# unreliable in practice — observed 30+ min gaps between successful ticks,
# pushing freshness budgets red. Production cron is fired externally via a
# scheduler-as-a-service that hits this workflow's `workflow_dispatch` API
# every 14 min. Manual runs are also available via the Actions UI.
on:
  # schedule disabled — see comment above
  # - cron: '*/14 * * * *'
  workflow_dispatch:

# This workflow does NOT push to its own repo. Snapshots flow only to the
# public data repo (CryptoToit/susdpeg-data) via the deploy key — keeps
# this repo's history clean (no 96 auto-commits/day).
permissions:
  contents: read

# Single run at a time — if a previous tick is still running, queue (don't kill).
concurrency:
  group: refresh-snapshots
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: execution/pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: execution/pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run collectors
        working-directory: execution/pipeline
        env:
          THEGRAPH_API_KEY: ${{ secrets.THEGRAPH_API_KEY }}
        run: python -m scripts.run_all

      - name: Push refreshed snapshots to public data repo
        id: mirror
        env:
          DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
        run: |
          set -e

          # Set up SSH with the data-repo deploy key.
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/data_repo_key
          chmod 600 ~/.ssh/data_repo_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/data_repo_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes"

          # Clone, copy fresh JSONs, commit, push.
          rm -rf /tmp/data-mirror
          git clone --depth 1 git@github.com:CryptoToit/susdpeg-data.git /tmp/data-mirror
          rm -rf /tmp/data-mirror/data
          mkdir -p /tmp/data-mirror/data
          cp -r execution/client/public/data/. /tmp/data-mirror/data/

          cd /tmp/data-mirror
          git config user.name 'susdpeg-cron'
          git config user.email 'susdpeg-cron@noreply.local'
          git add data/

          if git diff --staged --quiet; then
            echo "No snapshot changes — nothing to push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --staged --name-only | sed 's|^data/||;s|/latest\.json||' | paste -sd ',' -)
          git commit -m "auto: refresh snapshots [${changed}]"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsdelivr CDN cache (data mirror)
        if: steps.mirror.outputs.pushed == 'true'
        run: |
          set -e
          for snap in peg supply scorecard pool_420 radar flow trade_flow yield recovery_score; do
            curl -s -o /dev/null -w "  purge ${snap}: HTTP %{http_code}\n" \
              "https://purge.jsdelivr.net/gh/CryptoToit/susdpeg-data@main/data/${snap}/latest.json"
          done
